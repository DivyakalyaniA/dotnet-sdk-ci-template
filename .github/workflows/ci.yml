# =============================================================================
# CI PIPELINE - Generic Reusable Template (.NET SDK)
# =============================================================================
# PURPOSE:
#   This is the MAIN CI pipeline for .NET SDK applications.
#   It is fully generic and works on ANY GitHub Actions environment.
#   No platform specific tools required.
#
# WHAT IT DOES:
#   1. Builds the .NET application
#   2. Runs unit tests
#   3. Scans for security vulnerabilities using Snyk
#   4. Checks code quality using SonarCloud
#   5. Uploads build artifact to GitHub Artifacts
#
# HOW TO USE:
#   1. Copy this file to your app repo under .github/workflows/ci.yml
#   2. Update the ENV section below with your app details
#   3. Add the following secrets to your GitHub repo settings:
#      - SNYK_TOKEN (from snyk.io - free account)
#      - SONAR_TOKEN (from sonarcloud.io - free account)
# =============================================================================

name: .NET SDK CI Pipeline

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      operation:
        description: 'Select operation to perform'
        required: false
        type: choice
        options:
          - 'build-and-test'
          - 'build-test-and-scan'
          - 'publish'
        default: 'build-and-test'

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

# =============================================================================
# !! UPDATE THESE VALUES FOR YOUR APPLICATION !!
# =============================================================================
env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'src/SampleApp/SampleApp.csproj'
  TEST_PROJECT_PATH: 'src/SampleApp.Tests/SampleApp.Tests.csproj'
  ARTIFACT_NAME: 'my-app'

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1: BUILD
  # Restores packages and compiles the .NET application
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build application
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish application
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ./publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ github.run_number }}
          path: ./publish
          retention-days: 30

  # ---------------------------------------------------------------------------
  # JOB 2: UNIT TESTS
  # Runs unit tests and generates code coverage report
  # ---------------------------------------------------------------------------
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.TEST_PROJECT_PATH }}

      - name: Run unit tests
        run: |
          dotnet test ${{ env.TEST_PROJECT_PATH }} \
            --configuration Release \
            --no-restore \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: ./test-results
          retention-days: 30

  # ---------------------------------------------------------------------------
  # JOB 3: SECURITY SCAN (Snyk)
  # Scans dependencies for vulnerabilities
  # Requires SNYK_TOKEN secret - free account at snyk.io
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build, unit-test]
    if: ${{ inputs.operation == 'build-test-and-scan' || inputs.operation == 'publish' || github.event_name == 'push' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Run Snyk security scan
        uses: snyk/actions/dotnet@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # ---------------------------------------------------------------------------
  # JOB 4: CODE QUALITY (SonarCloud)
  # Analyses code quality
  # Requires SONAR_TOKEN secret - free account at sonarcloud.io
  # ---------------------------------------------------------------------------
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: [build, unit-test]
    if: ${{ inputs.operation == 'build-test-and-scan' || inputs.operation == 'publish' || github.event_name == 'push' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: ./test-results

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ---------------------------------------------------------------------------
  # JOB 5: CI SUMMARY
  # Always runs at the end
  # ---------------------------------------------------------------------------
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build, unit-test, security-scan, code-quality]
    if: always()

    steps:
      - name: Write CI Summary
        run: |
          {
            echo "# CI Pipeline Summary"
            echo "**Repository:** ${{ github.repository }}"
            echo "**Branch:** ${{ github.ref_name }}"
            echo "**Run Number:** ${{ github.run_number }}"
            echo ""
            echo "## Job Results"
            echo "| Job | Status |"
            echo "|---|---|"
            echo "| Build | ${{ needs.build.result }} |"
            echo "| Unit Tests | ${{ needs.unit-test.result }} |"
            echo "| Security Scan | ${{ needs.security-scan.result }} |"
            echo "| Code Quality | ${{ needs.code-quality.result }} |"
          } >> $GITHUB_STEP_SUMMARY
